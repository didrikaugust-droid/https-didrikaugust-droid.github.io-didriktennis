<style>

body{
margin:0;

}

/* TOP MENU */

.nav{
display:flex;

.nav a:hover{

.container{

}

.cards{
display:flex;

}

.card img{

height:160px;

.card p{
text-align:center;
margin-top:10px;
color:#f5d27a;
font-size:18px;
}

.card:hover{
transform:scale(1.05);
transition:0.3s;
